<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: common-head"></head>
<body class="container">
<div th:replace="~{fragments/admin-navbar :: admin-navbar}"></div>

<main>
    <div class="container bg-secondary-subtle p-4">
        <div class="row">
            <div th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></div>

            <div class="col-10">
                <table class="table">
                    <thead>
                    <tr>
                        <th scope="col">Id</th>
                        <th scope="col">Tên bắp nước</th>
                        <th scope="col">Hình ảnh</th>
                        <th scope="col">Giá</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="concession: ${concessions}">
                        <td th:text="${concession.concessionId}"></td>
                        <td th:text="${concession.concessionName}">1</td>
                        <td>
                            <img
                                    th:src="@{${concession.image}}"
                                    alt=""
                                    style="height:100px;"
                            />
                        </td>
                        <td th:text="${concession.price}">Hà Nội</td>
                    </tr>
                    </tbody>
                </table>

                <h2>Thêm bắp nước</h2>
                <form th:action="@{/admin/concession/addConcession}" method="post" enctype="multipart/form-data" th:object="${newConcession}">
                    <div class="mb-3">
                        <label for="concessionName" class="form-label">Tên bắp nước</label>
                        <input type="text" th:field="*{concessionName}" class="form-control" id="concessionName" >

                        <label for="image" class="form-label">Hình ảnh</label>
                        <input type="file" name="imageFile" accept="image/*" class="form-control" id="image">

                        <label for="price" class="form-label">Giá</label>
                        <input type="number" th:field="*{price}" class="form-control" id="price" >

                    </div>



                    <button type="submit" class="btn btn-primary">Thêm</button>
                </form>


            </div>
        </div>
    </div>
</main>


</body>
</html>
