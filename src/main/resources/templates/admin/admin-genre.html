<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: common-head"></head>
<body class="container">
<div th:replace="~{fragments/admin-navbar :: admin-navbar}"></div>

<main>
    <div class="container bg-secondary-subtle p-4">
        <div class="row">
            <div th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></div>

            <div class="col-10">
                <table class="table">
                    <thead>
                    <tr>
                        <th scope="col">Id</th>
                        <th scope="col">Tên thể loại</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="genre: ${genres}">
                        <td th:text="${genre.genreId}">1</td>
                        <td th:text="${genre.genreName}">Hà Nội</td>
                    </tr>
                    </tbody>
                </table>

                <h2>Thêm rạp</h2>
                <form th:action="@{/admin/genre/addGenre}" method="post" th:object="${newGenre}">
                    <div class="mb-3">
                        <label for="genreName" class="form-label">Tên thể loại</label>
                        <input type="text" th:field="*{genreName}" class="form-control" id="genreName" >



                    </div>



                    <button type="submit" class="btn btn-primary">Thêm</button>
                </form>


            </div>
        </div>
    </div>
</main>


</body>
</html>
