<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: common-head"></head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<body class="container">
<div th:replace="~{fragments/admin-navbar :: admin-navbar}"></div>

<main>
    <div class="container bg-secondary-subtle p-4">
        <div class="row">
            <div th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></div>

            <div class="col-10">
                <div class="row">
                    <div class="col-3">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="montserrat-display">Tổng doanh thu</h5>
                                <h5 class="montserrat-display text-warning" th:text="${#numbers.formatDecimal(totalEarnings, 0, 'COMMA', 0, 'POINT')} + ' đ'"> </h5>
                            </div>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="montserrat-display">Tổng vé bán</h5>
                                <h5 class="montserrat-display text-warning" th:text="${ticketsSold}">3945 vé</h5>
                            </div>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="montserrat-display">Tổng thẻ quà tặng</h5>
                                <h5 class="montserrat-display text-warning" th:text="${#numbers.formatDecimal(totalGiftCards, 0, 'COMMA', 0, 'POINT')} + ' đ'">5,000,000 đ</h5>
                            </div>
                        </div>
                    </div>
                    <div class="col-3">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="montserrat-display">Tổng bắp nước</h5>
                                <h5 class="montserrat-display text-warning" th:text="${#numbers.formatDecimal(totalConcessions, 0, 'COMMA', 0, 'POINT')} + ' đ'">5,000,000 đ</h5>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-8">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="montserrat-display">Doanh thu trong tuần qua</h5>
                                <canvas id="revenueChart"></canvas>

                            </div>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="montserrat-display">Doanh thu theo phim</h5>
                                <canvas id="revenueByMoviesChart"></canvas>

                            </div>
                        </div>
                    </div>
                </div>



            </div>
        </div>
    </div>
</main>


</body>

<script th:inline="javascript">
    const ctx = document.getElementById('revenueChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: /*[[${labels}]]*/,
            datasets: [{
                label: 'Doanh thu (VND)',
                data: /*[[${revenues}]]*/,
                backgroundColor: 'rgba(54, 162, 235, 0.5)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) {
                            return new Intl.NumberFormat('vi-VN').format(value) + ' đ';
                        }
                    }
                }
            },
            plugins: {
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return new Intl.NumberFormat('vi-VN').format(context.raw) + ' đ';
                        }
                    }
                }
            }
        }
    });



    const movieCtx = document.getElementById('revenueByMoviesChart').getContext('2d');
    new Chart(movieCtx, {
        type: 'doughnut',
        data: {
            labels: /*[[${movieTitles}]]*/,
            datasets: [{
                data: /*[[${movieRevenues}]]*/,
                backgroundColor: [
                    'rgba(255, 99, 132, 0.5)',
                    'rgba(54, 162, 235, 0.5)',
                    'rgba(255, 206, 86, 0.5)',
                    'rgba(75, 192, 192, 0.5)',
                    'rgba(153, 102, 255, 0.5)',
                    'rgba(255, 159, 64, 0.5)',
                    'rgba(199, 199, 199, 0.5)'
                ],
                borderColor: [
                    'rgba(255, 99, 132, 1)',
                    'rgba(54, 162, 235, 1)',
                    'rgba(255, 206, 86, 1)',
                    'rgba(75, 192, 192, 1)',
                    'rgba(153, 102, 255, 1)',
                    'rgba(255, 159, 64, 1)',
                    'rgba(199, 199, 199, 1)'
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom',
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            let label = context.label || '';
                            if (label) {
                                label += ': ';
                            }
                            label += new Intl.NumberFormat('vi-VN').format(context.raw) + ' đ';
                            return label;
                        }
                    }
                }
            }
        }
    });

</script>
</html>
