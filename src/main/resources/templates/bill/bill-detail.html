<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: common-head"></head>
<body class="container">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

<div class="container bg-secondary-subtle p-4">
    <div class="row pb-5">
        <div class="col-0 col-lg-4">

        </div>

        <div class="col-12 col-lg-4">

            <div th:replace="~{fragments/cart :: cart(${cart})}"></div>

            <div th:if="${bill.rating}" class="mt-3">
                <div><strong>Điểm đánh giá: </strong> <span th:text="${bill.rating}"></span></div>
                <div><strong>Nhận xét: </strong> <span th:text="${bill.comment}"></span></div>
            </div>

            <form th:action="@{/bill/{id}/postRating(id=${bill.billId})}" method="post"
                  th:object="${bill}" th:if="${bill.rating == null}">
                <div class="mb-3 mt-3">
                    <label for="rating" class="form-label">Điểm đánh giá</label>
                    <select th:field="*{rating}" class="form-control" id="rating">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10" selected>10</option>
                    </select>

                    <label for="comment" class="form-label">Nhận xét</label>
                    <input type="text" th:field="*{comment}" class="form-control" id="comment">

                    <button type="submit" class="btn btn-primary mt-3">Đăng nhận xét</button>
                </div>
            </form>

        </div>


        <div class="col-4"></div>


    </div>

</div>

</main>
</body>
<script th:inline="javascript">

    
</script>
</html>
