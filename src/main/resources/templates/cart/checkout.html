<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: common-head"></head>
<body class="container">

            <div>Bạn đang có: 12 điểm thưởng</div>
            <div class="form-check">
                <input
                        class="form-check-input"
                        type="checkbox"
                        value=""
                        id="checkChecked"
                        checked
                />
                <label class="form-check-label" for="checkChecked">
                    Sử dụng điểm thưởng
                </label>
            </div>
            <hr />
            <div class="montserrat-bold">Mã giảm giá</div>
            <div class="">
                <label for="exampleFormControlInput1" class="form-label"
                >Nhập mã giảm giá:</label
                >
                <input
                        type="email"
                        class="form-control"
                        id="exampleFormControlInput1"
                        placeholder=""
                        style="width: 20rem"
                />
            </div>
            <hr />

            <div class="montserrat-bold">Thẻ quà tặng</div>
            <div class="mb-2">Chọn thẻ quà tặng:</div>
<!--            <img-->
<!--                    src="/images/gift/the_night_fury.jpg"-->
<!--                    style="width: 150px"-->
<!--                    class="me-3"-->
<!--            />-->
<!--            <img src="/images/gift/l3_up.jpg" style="width: 150px" />-->
            <hr />

            <div class="montserrat-bold">Chọn phương thức thanh toán</div>

            <div class="form-check">
                <input
                        class="form-check-input"
                        type="radio"
                        name="radioDefault"
                        id="radioDefault1"
                        checked
                />
                <label class="form-check-label" for="radioDefault1">
                    Thẻ tín dụng
                </label>
            </div>
            <div class="form-check">
                <input
                        class="form-check-input"
                        type="radio"
                        name="radioDefault"
                        id="radioDefault2"
                />
                <label class="form-check-label" for="radioDefault2">
                    Ví MoMo
                </label>
            </div>
            <div class="form-check">
                <input
                        class="form-check-input"
                        type="radio"
                        name="radioDefault"
                        id="radioDefault3"
                />
                <label class="form-check-label" for="radioDefault3">
                    Ví ZaloPay
                </label>
            </div>
        </div>

        <div th:replace="~{fragments/cart :: cart(${showtime})}"></div>
