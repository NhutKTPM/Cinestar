<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: common-head"></head>
<body class="container">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

<div class="container bg-secondary-subtle p-4">
    <div class="row pb-5">
        <div class="col-8">

            <h2 class="montserrat-display mb-3">Chọn bắp nước</h2>
            <div class="row row-cols-3 row-gap-4">
                <div th:each="concession: ${concessions}" class="col">

                    <div class="card">
                        <img th:src="@{${concession.image}}" class="card-img-top" />
                        <div class="card-body">
                            <h5 class="card-title montserrat-bold" th:text="${concession.concessionName}">Dragon Combo 1</h5>
                            <div class="card-text d-flex justify-content-between">
                                <div th:text="${#numbers.formatDecimal(concession.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">389,000 đ</div>
                                <a href="#" class="btn btn-warning"
                                   th:onclick="'addConcession(' + ${concession.concessionId} + ')'">Thêm</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>


        <div class="col-4">
            <div th:replace="~{fragments/cart :: cart(${cart})}"></div>

            <div class="d-flex justify-content-between mt-3">
                <a th:href="@{/cart/{id}/seat(id=${showtime.showtimeId})}" class="btn btn-secondary">Trở lại</a>
                <a th:href="@{/cart/{id}/checkoutPage(id=${showtime.showtimeId})}" class="btn btn-warning">Tiếp tục</a>
            </div>
        </div>



    </div>

</div>

</main>
</body>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadCartWhenPageFirstLoad();
    });
    // Add to concession-selection.html
    function loadCartWhenPageFirstLoad() {
        const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
        const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");

        fetch(`/cart/getCart`, {
          method: 'GET',
          headers: {
              'Content-Type': 'application/json',
              [header]: token
          }
        })
        .then(response => response.json())
        .then(cart => {
            console.log(cart);
            // Update cart display
            updateCartDisplay(cart);
        });
    }



    // Add to concession-selection.html
    function addConcession(concessionId) {
        const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
        const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");

        fetch(`/cart/concessions/add/${concessionId}`, {
          method: 'POST',
          headers: {
              'Content-Type': 'application/json',
              [header]: token
          }
        })
        .then(response => response.json())
        .then(cart => {
            console.log(cart);
            // Update cart display
            updateCartDisplay(cart);
        });
    }

    function updateCartDisplay(cart) {
        // First update the seats display (reuse existing function)
        // updateCartDisplaySeats(cart);

        // Find the "Bắp nước" section
        const concessionSection = document.getElementById('concession-items');
        if (!concessionSection) return;

        // Clear existing concession items
        while (concessionSection.firstChild) {
            concessionSection.removeChild(concessionSection.firstChild);
        }


        // Add new concession items
        if (cart.concessionItems && cart.concessionItems.length > 0) {
            cart.concessionItems.forEach(item => {
                const concessionDiv = document.createElement('div');
                concessionDiv.className = 'd-flex justify-content-between';

                const leftSection = document.createElement('div');
                leftSection.className = 'd-flex align-items-center gap-2';

                const removeIcon = document.createElement('i');
                removeIcon.className = 'bi bi-x-lg text-danger';
                removeIcon.style.cursor = 'pointer';
                removeIcon.onclick = function() {
                    const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
                    const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");

                    fetch(`/cart/concessions/decrease/${item.id}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            [header]: token
                        }
                    })
                    .then(response => response.json())
                    .then(cart => {
                        updateCartDisplay(cart);
                    });
                };



                const nameDiv = document.createElement('div');
                nameDiv.textContent = `${item.concessionName}${item.quantity > 1 ? ` x${item.quantity}` : ''}`;

                leftSection.appendChild(removeIcon);
                leftSection.appendChild(nameDiv);

                const priceDiv = document.createElement('div');
                priceDiv.textContent = `${(item.totalPrice).toLocaleString('en-US')} đ`;

                concessionDiv.appendChild(leftSection);
                concessionDiv.appendChild(priceDiv);

                concessionSection.appendChild(concessionDiv);
            });
        }

        // Update total price
        const totalElement = document.getElementById('total');
        if (totalElement) {
            totalElement.textContent = `${cart.total.toLocaleString('en-US')} đ`;
        }
    }
    
    

</script>

</html>
