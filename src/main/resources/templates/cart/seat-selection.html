<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: common-head"></head>
<body class="container">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

<div class="container bg-secondary-subtle p-4">
    <div class="row pb-5">
        <div class="col-8">
            <div class="row">
                <div class="col-12 d-flex justify-content-center">
                    <div class="w-75">
                        <svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="px" viewBox="0 75 1600 250" enable-background="new 0 0 1600 1600" xml:space="preserve"><g>	<path fill="#686869" d="M1535.9,225.3c-154.6-33.7-427.5-81.4-732.8-81.4c-309.3,0-583.2,48.6-735,81.9l0.1-52
		          c151.7-33.4,425.5-81.9,734.9-81.9c305.2,0,578.1,47.7,732.7,81.4L1535.9,225.3z"></path> </g></svg>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-12 d-flex justify-content-center">



                    <div class="seat-map">
                        <div th:each="row : ${seatLayout}" class="row column-gap-1 mb-1">
                            <span style="width: 1.5rem; height: 1.5rem" th:text="${row[0].rowLabel}"></span>
                            <button th:each="seat : ${row}"
                                    th:class="${'border border-2 rounded p-0 ' +
                                    (boughtSeats.contains(seat) ? 'border-secondary-subtle bg-secondary' :
                                    (seat.seatType.seatTypeId == 2 ? 'border-warning' :
                                    (seat.seatType.seatTypeId == 3 ? 'border-danger' :
                                    (seat.seatType.seatTypeId == 4 ? 'border-success' : 'border-primary'))))}"
                                    th:disabled="${boughtSeats.contains(seat)}"
                                    style="width: 1.5rem; height: 1.5rem"
                                    th:data-seat-id="${seat.seatId}"
                                    th:text="${seat.seatNumber}">
                            </button>
                        </div>
                    </div>


                </div>
            </div>

            <div class="d-flex justify-content-evenly mt-5">
                <div class="d-flex">
                    <div class="border border-2 rounded p-0 border-primary" style="width: 1.5rem; height: 1.5rem"></div>
                    <div>&nbsp;&nbsp;Ghế thường</div>
                </div>

                <div class="d-flex">
                <div class="border border-2 rounded p-0 border-warning" style="width: 1.5rem; height: 1.5rem"></div>
                <div>&nbsp;&nbsp;Ghế VIP</div>
                </div>
                <div class="d-flex">
                    <div class="border border-2 rounded p-0 border-danger" style="width: 1.5rem; height: 1.5rem"></div>
                    <div>&nbsp;&nbsp;3D</div>
                </div>
                <div class="d-flex">
                    <div class="border border-2 rounded p-0 border-success" style="width: 1.5rem; height: 1.5rem"></div>
                    <div>&nbsp;&nbsp;IMAX</div>
                </div>
                <div class="d-flex">
                    <div class="border border-2 rounded p-0 border-light bg-light" style="width: 1.5rem; height: 1.5rem"></div>
                    <div>&nbsp;&nbsp;Đã chọn</div>
                </div>
                <div class="d-flex">
                <div class="border border-2 rounded p-0 border-secondary-subtle" style="width: 1.5rem; height: 1.5rem; background-color: #41464b;"></div>
                <div>&nbsp;&nbsp;Không thể chọn</div>
                </div>


            </div>


        </div>

        <div class="col-4">
            <div th:replace="~{fragments/cart :: cart(${cart})}"></div>

            <div class="d-flex justify-content-between mt-3">
                <div class="btn btn-secondary">Trở lại</div>
                <a id="continue-button" th:href="@{/cart/{id}/concession(id=${showtime.showtimeId})}" class="btn btn-warning disabled">Tiếp tục</a>
            </div>

        </div>

    </div>

</div>

</main>
</body>

<script>

    // Add to seat-selection.html
    function toggleSeat(seatId) {
        // Get CSRF token from meta tag
        const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
        const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");

        fetch(`/cart/seats/add/${seatId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [header]: token // Add CSRF token to request headers

            }
        })
        .then(response => response.json())
        .then(cart => {
            console.log(cart);
            // Update cart display
            updateCartDisplay(cart);
        });
    }

    function removeSeat(seatId) {
        // Get CSRF token from meta tag
        const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
        const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
        fetch(`/cart/seats/remove/${seatId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [header]: token // Add CSRF token to request headers
            }
        })
        .then(response => response.json())
        .then(cart => {
            console.log(cart);
            // Update cart display
            updateCartDisplay(cart);

        });
    }
    
    function updateCartDisplay(cart) {
        // Update selected seats display
        const selectedSeatsElement = document.getElementById('selected-seats');
        selectedSeatsElement.textContent = cart.seats;

        // Update total price
        const totalTicketElement = document.getElementById('total-ticket');
        totalTicketElement.textContent = `${cart.totalTicket.toLocaleString('vi-VN')} đ`;
        const totalElement = document.getElementById('total');
        totalElement.textContent = `${cart.total.toLocaleString('vi-VN')} đ`;

        // Disable/enable the continue button based on seat selection
        const continueButton = document.getElementById('continue-button');
        if (cart.seats && cart.seats.trim() !== '') {
            continueButton.classList.remove('disabled');
        } else {
            continueButton.classList.add('disabled');
        }

    }
    
    
    document.addEventListener('DOMContentLoaded', function() {
        const seatButtons = document.querySelectorAll('[data-seat-id]');
    
        seatButtons.forEach(button => {
            button.addEventListener('click', function() {
                const seatId = this.getAttribute('data-seat-id');

                // If seat is already selected (has bg-light class), remove it
                if (this.classList.contains('bg-light')) {
                    removeSeat(seatId);
                    this.classList.remove('bg-light');
                    this.classList.remove('border-light');
                } else {
                    // If seat is not selected, add it
                    toggleSeat(seatId);
                    this.classList.add('bg-light');
                    this.classList.add('border-light');
                }
            });



        });
    });
    
    




</script>

</html>
