<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: common-head"></head>

<body class="container">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

<div class="container bg-secondary-subtle p-4">
    <h2 class="montserrat-display">Danh sách rạp chiếu </h2>

    <div class="fw-bold mb-2">Chọn khu vực</div>
    <div class="col-12 col-lg-4 mb-3">
        <select id="regionSelect" class="form-select" aria-label="Region select">
            <th:block th:each="region : ${regions}">
                <option th:value="${region.regionId}" th:text="${region.regionName}"
                        th:selected="${region.regionId == regionId}"></option>
            </th:block>
        </select>
    </div>

    <div class="row row-gap-4 mb-5">
        <div class="col-12 col-lg-4" th:each="cinema: ${cinemas}">
            <div th:class="${cinema.cinemaId==cinemaId} ? 'card border-primary-subtle bg-primary-subtle' : 'card'"
                 style="cursor: pointer;"
                 th:onclick="selectCinema([[${cinema.cinemaId}]])"
            >
                <div class="card-body">
                    <h5 class="card-title montserrat-bold"
                        th:text="${cinema.cinemaName}"
                    >
                        Rạp Cinestar Vincom Xuân Khánh
                    </h5>
                    <h6 class="card-subtitle mb-2 text-body-secondary mt-2" th:text="${cinema.address}">
                        209 Đ. 30 Tháng 4, Xuân Khánh, Ninh Kiều, Cần Thơ
                    </h6>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${not #lists.isEmpty(showDates)}" class="d-flex column-gap-2 mb-3 overflow-x-auto">
        <div th:each="showDate : ${showDates}"
             th:data-date="${#temporals.format(showDate, 'yyyy-MM-dd')}"
             class="border border-warning-subtle rounded p-2 d-flex flex-column align-items-center show-date"
             style="width: 4rem; cursor: pointer;">
            <div class="montserrat-bold" th:text="${#temporals.format(showDate, 'E')}">T7</div>
            <div th:text="${#temporals.format(showDate, 'dd/MM')}">14/06</div>
        </div>
    </div>



    <!-- Showtimes by movies -->
    <div th:if="${#maps.isEmpty(showtimes)}" class="mb-3">
        Không tìm thấy suất chiếu
    </div>
    <div th:if="${not #maps.isEmpty(showtimes)}">
        <div th:each="movie : ${showtimes}">


            <div class="card w-100 mb-3">
                <div class="card-body">
                    <div class="d-flex mb-3">
                        <!-- Get first showtime from any room type to access poster image -->
                        <img
                                th:with="firstShowtime=${movie.value.values().iterator().next().get(0)}"
                                th:src="${firstShowtime.movie.poster}"
                                class="object-fit-cover me-3"
                                style="height: 6.5rem; width:6.5rem"
                        />
                        <h5 class="montserrat-bold">
                            <a th:with="firstShowtime=${movie.value.values().iterator().next().get(0)}"
                                    th:href="@{/movie/{id}(id=${firstShowtime.movie.movieId})}" th:text="${movie.key}"
                            class="text-light text-decoration-none"> Ten phim </a>
<!--                            &nbsp;<i class="bi bi-heart"></i>-->
                        </h5>

                    </div>

                    <div th:each="roomType : ${movie.value}">
                        <div class="mb-2">
                            <strong th:text="${roomType.key}">Rạp 2D</strong>
                        </div>
                        <div class="d-flex column-gap-2 mb-2">
                            <th:block th:each="showtime : ${roomType.value}">
                                <a th:href="@{/cart/{id}/seat(id=${showtime.showtimeId})}" class="btn btn-warning fw-bold" style="width: 5rem"
                                   th:text="${#temporals.format(showtime.startingTime, 'HH:mm')}">
                                </a>
                            </th:block>
                        </div>
                        <hr th:if="${!roomType.key.equals(movie.value.keySet().toArray()[movie.value.size() - 1])}">
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

</main>


</body>
<script>
    document.getElementById('regionSelect').addEventListener('change', function() {
        const selectedRegionId = this.value;
        window.location.href = `/cinema?regionId=${selectedRegionId}`;
    });

    function selectCinema(cinemaId) {
        const currentUrl = new URL(window.location.href);
        const regionId = currentUrl.searchParams.get('regionId');

        let url = '/cinema?cinemaId=' + cinemaId;
        if (regionId) {
            url += '&regionId=' + regionId;
        }

        window.location.href = url;
    }





    // Add click handlers for date selection
    document.addEventListener('DOMContentLoaded', function() {
        const dates = document.querySelectorAll('.show-date');

        // Get date from URL if it exists
        const urlParams = new URLSearchParams(window.location.search);
        const dateParam = urlParams.get('date');

        if (dateParam) {
            // If date parameter exists in URL, select that date
            dates.forEach(date => {
                if (date.dataset.date === dateParam) {
                    date.classList.add('selected');
                    date.classList.remove('border-warning-subtle');
                    date.classList.remove('border');
                    date.classList.add('bg-light');
                    date.classList.add('text-dark');
                }
            });
        } else if (dates.length > 0) {
            // If no date parameter, select first date
            dates[0].classList.add('selected');
            dates[0].classList.remove('border-warning-subtle');
            dates[0].classList.remove('border');
            dates[0].classList.add('bg-light');
            dates[0].classList.add('text-dark');
        }

        dates.forEach(date => {
            date.addEventListener('click', function() {
                // Remove selection from all dates
                dates.forEach(d => {
                    d.classList.remove('selected');
                    d.style.backgroundColor = '';
                });

                // Add selection to clicked date
                this.classList.add('selected');
                this.style.backgroundColor = '#ffc107';

                filterShowtimesByDate();
            });
        });


        // Scroll to showtimes section if date parameter exists
        //if (urlParams.has('date')) {
        //    document.getElementById('showtimes-section').scrollIntoView({behavior: 'smooth', block: "start"});
        //}
    });




    function filterShowtimesByDate() {
        const currentUrl = new URL(window.location.href);
        const regionId = currentUrl.searchParams.get('regionId');
        const cinemaId = currentUrl.searchParams.get('cinemaId');
        const selectedDateElement = document.querySelector('.show-date.selected');
        const date = selectedDateElement ? selectedDateElement.dataset.date : '';

        //let url = '/cinema?cinemaId=' + cinemaId;
        //if (regionId) {
        //    url += '&regionId=' + regionId;
        //}

        //window.location.href = url;

        //const regionId = document.getElementById('regionSelect').value;
        //const cinemaId = document.getElementById('cinemaSelect').value;
        //const selectedDateElement = document.querySelector('.show-date.selected');
        //const date = selectedDateElement ? selectedDateElement.dataset.date : '';

        console.log('Selected Region ID:', regionId);
        console.log('Selected Cinema ID:', cinemaId);
        console.log('Selected Date:', date);

        //const currentUrl = new URL(window.location.href);
        //const baseUrl = currentUrl.pathname;

        let url = `/cinema?date=${date}`;
        if (cinemaId) {
            url += `&cinemaId=${cinemaId}`;
        }
        if (regionId) {
            url += `&regionId=${regionId}`;
        }

        window.location.href = url;


    }

</script>
</html>
