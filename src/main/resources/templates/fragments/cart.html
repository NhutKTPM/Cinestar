<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>



<a th:fragment="movieCard(movie)" th:href="@{/movie/{id}(id=${movie.movieId})}" class="card h-100 bg-transparent border-0 rounded-0">
    <div class="ratio" style="--bs-aspect-ratio: 147.917%;">
        <img th:src="@{${movie.poster}}" class="card-img-top object-fit-cover rounded-0"/>
    </div>
    <div class="card-body ps-0">
        <h5 class="card-title montserrat-bold" style="height: 3.1rem;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    text-overflow: ellipsis;" th:text="${movie.movieName}">Tên phim</h5>
    </div>
</a>


<div th:fragment="cart(cart)">
    <div class="border p-3">
        <div class="row mb-1">
            <div class="col-12 text-primary montserrat-bold">Thông tin vé</div>
        </div>
        <div class="row d-flex">
            <img
                    th:src="@{${cart.poster}}"
                    class="col-4 object-fit-cover"
                    style="height: 6.5rem"
            />
            <div class="col-8">
                <div class="fw-bold" th:text="${cart.movieName}">Từ Vũ Trụ John Wick: Ballerina</div>
                <div th:text="${cart.roomType}">2D</div>
                <div class="badge text-bg-warning">P</div>
            </div>
        </div>

        <div class="row">
            <div class="col-4 text-secondary">Ngày chiếu:</div>
            <div class="col-8" th:text="${#temporals.format(cart.startingTime, 'dd/MM/yyyy')}">27/6/2025</div>
        </div>
        <div class="row">
            <div class="col-4 text-secondary">Giờ chiếu:</div>
            <div class="col-8" th:text="${#temporals.format(cart.startingTime, 'HH:mm')}">17:50</div>
        </div>
        <div class="row">
            <div class="col-4 text-secondary">Rạp chiếu:</div>
            <div class="col-8" th:text="${cart.cinema}">Vincom Xuân Khánh Phòng 04</div>
        </div>
        <div class="row">
            <div class="col-4 text-secondary">Phòng chiếu:</div>
            <div class="col-8" th:text="${cart.room}">Vincom Xuân Khánh Phòng 04</div>
        </div>
        <div class="row">
            <div class="col-4 text-secondary">Ghế:</div>
            <div id="selected-seats" class="col-8" th:text="${cart.seats}"></div>
        </div>
        <div class="row">
            <div class="col-4"></div>
            <div id="total-ticket" class="col-8 text-warning fw-bold text-end" th:text="${#numbers.formatDecimal(cart.totalTicket, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
        </div>
        <hr />
        <div class="row">
            <div class="col-12 text-primary montserrat-bold">Bắp nước</div>
        </div>
        <div id="concession-items">
            <div th:each="item : ${cart.concessionItems}" class="d-flex justify-content-between">
                <div th:text="${item.concessionName} + (${item.quantity > 1} ? ' x' + ${item.quantity} : '')"></div>
                <div th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
            </div>
        </div>

        <hr />
        <div class="row">
            <div class="col-12 text-primary montserrat-bold">Thẻ quà tặng</div>
        </div>
        <div id="giftcards">

        </div>

        <hr />
        <div class="d-flex justify-content-between">
            <div class="text-primary montserrat-bold">Tổng tiền</div>
            <div id="total" class="fw-bold text-warning" th:text="${#numbers.formatDecimal(cart.total, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</div>
        </div>

    </div>
</div>


</body>

<script>

    // Add to concession-selection.html
    function addConcession(concessionId) {
        const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
        const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");

        fetch(`/cart/concessions/add/${concessionId}`, {
          method: 'POST',
          headers: {
              'Content-Type': 'application/json',
              [header]: token
          }
        })
        .then(response => response.json())
        .then(cart => {
            console.log(cart);
            // Update cart display
            updateCartDisplay(cart);
        });
    }

    function updateCartDisplay(cart) {
        // First update the seats display (reuse existing function)
        // updateCartDisplaySeats(cart);

        // Find the "Bắp nước" section
        const concessionSection = document.getElementById('concession-items');
        if (!concessionSection) return;

        // Clear existing concession items
        while (concessionSection.firstChild) {
            concessionSection.removeChild(concessionSection.firstChild);
        }


        // Add new concession items
        if (cart.concessionItems && cart.concessionItems.length > 0) {
            cart.concessionItems.forEach(item => {
                const concessionDiv = document.createElement('div');
                concessionDiv.className = 'd-flex justify-content-between';

                const nameDiv = document.createElement('div');
                nameDiv.textContent = `${item.concessionName}${item.quantity > 1 ? ` x${item.quantity}` : ''}`;

                const priceDiv = document.createElement('div');
                priceDiv.textContent = `${(item.totalPrice).toLocaleString('vi-VN')} đ`;

                concessionDiv.appendChild(nameDiv);
                concessionDiv.appendChild(priceDiv);

                concessionSection.appendChild(concessionDiv);
            });
        }

        // Update total price
        const totalElement = document.getElementById('total');
        if (totalElement) {
            totalElement.textContent = `${cart.total.toLocaleString('vi-VN')} đ`;
        }
    }
</script>
</html>
