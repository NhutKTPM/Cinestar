<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: common-head"></head>
<body class="container">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <div
            id="carouselExampleIndicators"


            class="carousel slide pt-4 bg-secondary-subtle"
    >
        <div class="carousel-indicators" data-bs-theme="light">
            <button
                    type="button"
                    data-bs-target="#carouselExampleIndicators"
                    data-bs-slide-to="0"
                    class="active"
                    aria-current="true"
                    aria-label="Slide 1"
            ></button>
            <button
                    type="button"
                    data-bs-target="#carouselExampleIndicators"
                    data-bs-slide-to="1"
                    aria-label="Slide 2"
            ></button>
            <button
                    type="button"
                    data-bs-target="#carouselExampleIndicators"
                    data-bs-slide-to="2"
                    aria-label="Slide 3"
            ></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img
                        th:src="@{img/carousel/ballerina-2048_1748252066486.jpg}"
                        class="d-block w-100 h-100"
                        alt="..."
                />
            </div>
            <div class="carousel-item">
                <img
                        th:src="@{img/carousel/mua-lua-2048_1747295237842.jpg}"
                        class="d-block w-100 h-100"
                        alt="..."
                />
            </div>
            <div class="carousel-item">
                <img
                        th:src="@{img/carousel/hdg_payoff_980x448_1.jpg}"
                        class="d-block w-100 h-100"
                        alt="..."
                />
            </div>
        </div>
        <button
                class="carousel-control-prev"
                type="button"
                data-bs-target="#carouselExampleIndicators"
                data-bs-slide="prev"
                data-bs-theme="light"
        >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button
                class="carousel-control-next"
                type="button"
                data-bs-target="#carouselExampleIndicators"
                data-bs-slide="next"
                data-bs-theme="light"
        >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

<div class="container bg-secondary-subtle p-4">
    <h2 class="montserrat-display mb-3">Phim đang chiếu</h2>
    <div class="row row-gap-4 mb-3">
        <div th:each="movie: ${topShowingMovies}" class="col-3">
            <div th:replace="~{fragments/movieCard :: movieCard(${movie})}"></div>
        </div>
    </div>

    <div class="text-center mb-5">
        <a href="/movie?showingOrUpcoming=showing" type="button" class="btn btn-outline-warning">
            Xem thêm >
        </a>
    </div>



    <h2 class="montserrat-display mb-3">Phim sắp chiếu</h2>
    <div class="row row-gap-4 mb-3">
        <div th:each="movie: ${topUpcomingMovies}" class="col-3">
            <div th:replace="~{fragments/movieCard :: movieCard(${movie})}"></div>
        </div>
    </div>

    <div class="text-center mb-5">
        <a href="/movie?showingOrUpcoming=upcoming" type="button" class="btn btn-outline-warning">
            Xem thêm >
        </a>
    </div>

</div>

</main>
</body>
</html>
