<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: common-head"></head>

<style>
    .show-date:hover {
        background-color: rgba(255, 193, 7, 0.5);
    }
    .show-date.selected {
        background-color: #ffc107;
    }
</style>

<body class="container">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>

<div class="container bg-secondary-subtle p-4">
    <div class="row gx-5">
        <div class="col-9">
            <div class="row mb-3">
                <div class="col-4">
                    <img
                            th:src="@{${movie.poster}}"
                            alt=""
                            class="w-100"
                    />
                </div>
                <div class="col-8">
                    <iframe
                            class="w-100 h-100"
                            th:src="@{'https://www.youtube.com/embed/' + ${movie.trailer}}"

                            title="YouTube video player"
                            frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            referrerpolicy="strict-origin-when-cross-origin"
                            allowfullscreen
                    ></iframe>
                </div>
            </div>

            <h3 class="montserrat-bold">
                <span th:text="${movie.movieName}">Từ Vũ Trụ John Wick: Ballerina</span>
                <span class="badge text-bg-warning">P</span>
            </h3>
            <div class="d-flex">
                <div>
                    <i class="bi bi-clock text-warning"></i>&nbsp; <span th:text="${movie.length}"></span> phút
                </div>
                <div class="ms-4">
                    <i class="bi bi-calendar text-warning"></i>&nbsp; <span th:text="${movie.showDate}"></span>
                </div>
            </div>
            <div><strong>Quốc gia:</strong> <span th:text="${movie.country}"></span></div>
<!--            <div><strong>Nhà sản xuất:</strong> <span th:text="${movie.length}"></span></div>-->
            <div><strong>Thể loại:</strong> Phiêu lưu</div>
            <div><strong>Đạo diễn:</strong> <span th:text="${movie.director}"></span></div>
            <div>
                <strong>Diễn viên:</strong> <span th:text="${movie.actors}"></span>
            </div>
            <div class="card w-100 mb-5 mt-3">
                <div class="card-body">
                    <h5 class="montserrat-bold">Nội dung phim</h5>

                    <div th:text="${movie.description}"></div>

                </div>
            </div>

            <h3 class="montserrat-bold mb-3">
                Chọn suất chiếu
            </h3>

            <div class="row">
                <div class="col-4 mb-3">
                    <select id="regionSelect" class="form-select" aria-label="Region select">
                        <option selected value="">Toàn quốc</option>
                        <th:block th:each="region : ${regions}">
                            <option th:value="${region.regionId}" th:text="${region.regionName}"></option>
                        </th:block>
                    </select>
                </div>
                <div class="col-4 mb-3">
                    <select id="cinemaSelect" class="form-select" aria-label="Cinema select">
                        <option selected value="">Tất cả rạp</option>
                    </select>
                </div>
            </div>


            <div class="d-flex column-gap-2 mb-3">
                <div th:each="showDate : ${showDates}"
                     th:data-date="${#temporals.format(showDate, 'yyyy-MM-dd')}"
                     class="border border-warning-subtle rounded p-2 d-flex flex-column align-items-center show-date"
                     style="width: 4rem; cursor: pointer;">
                    <div class="montserrat-bold" th:text="${#temporals.format(showDate, 'E')}">T7</div>
                    <div th:text="${#temporals.format(showDate, 'dd/MM')}">14/06</div>
                </div>
            </div>

<!--            Showtimes by cinemas -->
            <div id="showtimesContainer">

            </div>

<!--            <div th:replace="~{fragments/cinema-showtime-card :: cinema-showtime-card}"></div>-->





        </div>

        <div class="col-3">
            <h4 class="montserrat-bold mb-3">Tin tức</h4>

        </div>
    </div>

</div>

</main>

<script th:inline="javascript">
    function loadCinemas(regionId) {
        const cinemaSelect = document.getElementById('cinemaSelect');

        // Clear existing options except the first one
        while (cinemaSelect.options.length > 1) {
            cinemaSelect.remove(1);
        }

        // If no region selected (Toàn quốc), fetch all cinemas
        const apiUrl = regionId ? `/api/cinemas/region/${regionId}` : '/api/cinemas';
        
        fetch(apiUrl)
            .then(response => response.json())
            .then(cinemas => {
                cinemas.forEach(cinema => {
                    const option = new Option(cinema.cinemaName, cinema.cinemaId);
                    cinemaSelect.add(option);
                });
            })
            .catch(error => console.error('Error:', error));
    }

    // Load all cinemas when page loads
    document.addEventListener('DOMContentLoaded', function() {
        loadCinemas(''); // Load all cinemas initially
    });

    // Handle region selection changes
    document.getElementById('regionSelect').addEventListener('change', function() {
        loadCinemas(this.value);
        filterShowtimes();
    });




        // Add click handlers for date selection
    document.addEventListener('DOMContentLoaded', function() {
        const dates = document.querySelectorAll('.show-date');

        // Select first date by default
        if (dates.length > 0) {
            dates[0].classList.add('selected');
            dates[0].style.backgroundColor = '#ffc107';
        }

        dates.forEach(date => {
            date.addEventListener('click', function() {
                // Remove selection from all dates
                dates.forEach(d => {
                    d.classList.remove('selected');
                    d.style.backgroundColor = '';
                });

                // Add selection to clicked date
                this.classList.add('selected');
                this.style.backgroundColor = '#ffc107';

                filterShowtimes();
            });
        });

        // Add change handler for cinema select
        // document.getElementById('cinemaSelect').addEventListener('change', filterShowtimes);

        // Initial filter
        // filterShowtimes();
    });
    
    
    
    function filterShowtimes() {
    const regionId = document.getElementById('regionSelect').value;
    const cinemaId = document.getElementById('cinemaSelect').value;
    const date = document.querySelector('.show-date.selected').dataset.date;
    
    console.log('Selected Region ID:', regionId);
    console.log('Selected Cinema ID:', cinemaId); 
    console.log('Selected Date:', date);
    
    // Make API call to get showtimes
    fetch(`/api/showtimes?date=${date}`)
        .then(response => response.json())
        .then(showtimeMap => {
            console.log(showtimeMap);
            
            // Get the container where we'll put all cinema cards
            const showtimesContainer = document.getElementById('showtimesContainer');
            showtimesContainer.innerHTML = ''; // Clear existing content
            
            // For each cinema and its showtimes in the map
            Object.entries(showtimeMap).forEach(([cinemaName, showtimes]) => {
                // Only show cinemas that match the selected cinema filter, or all if no cinema is selected
                if (!cinemaId || cinemaName.includes(cinemaId)) {
                    const cinemaCard = document.createElement('div');
                    cinemaCard.className = 'card w-100 mb-3';
                    cinemaCard.innerHTML = `
                        <div class="card-body">
                            <h5 class="montserrat-bold">
                                ${cinemaName} &nbsp;<i class="bi bi-heart"></i>
                            </h5>
                            <div class="d-flex column-gap-2 mb-2">
                                ${showtimes.map(showtime => `
                                    <button class="btn btn-warning fw-bold" style="width: 5rem">
                                        ${new Date(showtime.startingTime).toLocaleTimeString('vi-VN', {
                                            hour: '2-digit',
                                            minute: '2-digit'
                                        })}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    showtimesContainer.appendChild(cinemaCard);
                }
            });
        })
        .catch(error => console.error('Error fetching showtimes:', error));
}

    // document.getElementById('regionSelect').addEventListener('change', filterShowtimes);
    document.getElementById('cinemaSelect').addEventListener('change', filterShowtimes);
</script>

</body>
</html>
